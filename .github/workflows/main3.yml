name: xerox

on:
  schedule:
    - cron: "*/40 * * * *"
  workflow_dispatch:

jobs:
  build:
    env:
      PY_COLORS: "1"

    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.13"]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    # ---------------------------------------------------------
    # Install Brave Browser
    # ---------------------------------------------------------
    - name: Install Brave Browser
      run: |
        echo "Installing Brave Browser..."
        sudo apt-get update -y
        sudo apt install -y apt-transport-https curl
        curl -fsSLo /usr/share/keyrings/brave-browser-archive-keyring.gpg \
          https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg
        echo "deb [signed-by=/usr/share/keyrings/brave-browser-archive-keyring.gpg] \
          https://brave-browser-apt-release.s3.brave.com/ stable main" \
          | sudo tee /etc/apt/sources.list.d/brave-browser-release.list
        sudo apt update -y
        sudo apt install -y brave-browser
      shell: bash

    # ---------------------------------------------------------
    # Install Cloudflare WARP
    # ---------------------------------------------------------
    - name: Install WARP
      run: |
        echo "Setting up Cloudflare WARP..."
        sudo apt-get -y update
        curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg \
          | sudo gpg --yes --dearmor \
          --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg

        echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] \
          https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" \
          | sudo tee /etc/apt/sources.list.d/cloudflare-client.list

        sudo apt-get update
        sudo apt-get install -y --no-install-recommends cloudflare-warp

        sudo warp-cli --accept-tos registration new
        sudo warp-cli --accept-tos mode warp+doh
        sudo warp-cli --accept-tos connect

        sleep $((5 + RANDOM % 4))
      shell: bash

    - name: Verify WARP connection
      run: |
        echo "Checking WARP connection..."
        curl -s https://www.cloudflare.com/cdn-cgi/trace | grep "warp=on"
      shell: bash

    # ---------------------------------------------------------
    # Sanitychecks (do not break workflow)
    # ---------------------------------------------------------
    - name: Randomized environment check
      run: |
        echo "Performing random environment check..."
        case $((RANDOM % 3)) in
          0) echo "Check A passed." ;;
          1) echo "Check B passed." ;;
          2) echo "Check C passed." ;;
        esac
        sleep $((2 + RANDOM % 3))
      shell: bash

    - name: Random CPU info check
      run: |
        echo "Random CPU check..."
        if [ $((RANDOM % 2)) -eq 0 ]; then
          lscpu | head -n 5
        else
          echo "Skipping CPU dump this run."
        fi
        sleep $((1 + RANDOM % 4))
      shell: bash

    # ---------------------------------------------------------
    # Locale setup
    # ---------------------------------------------------------
    - name: Set Locale
      run: |
        sudo apt-get install tzdata locales -y
        sudo locale-gen en_US.UTF-8
        sudo localectl set-locale LANG="en_US.UTF-8"
        export LANG="en_US.UTF-8"
        sudo update-locale
        locale -a
        locale
      shell: bash

    # ---------------------------------------------------------
    # Python dependencies
    # ---------------------------------------------------------
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip wheel
        pip install --upgrade seleniumbase pyautogui pymongo python-xlib
      shell: bash

    - name: Install chromedriver
      run: |
        seleniumbase install chromedriver
      shell: bash

    # ---------------------------------------------------------
    # Run script
    # ---------------------------------------------------------
    - name: Run xer.py
      run: |
        python xer.py --brave --incognito --do-not-track --xvfb --screenshot
      shell: bash

